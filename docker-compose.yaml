services:
  db_prod:
    image: postgres:18-alpine
    container_name: etl_cicd_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_PROD_DB}
      POSTGRES_USER: ${POSTGRES_PROD_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PROD_PASSWORD}
    volumes:
      - postgres_db_prod_volume:/var/lib/postgresql/data
      - ./entrypoints/db/:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_PROD_USER} -d ${POSTGRES_PROD_DB}",
        ]
      interval: 3s
      timeout: 3s
      retries: 5

  db_test:
    image: postgres:18-alpine
    container_name: etl_cicd_db_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_TEST_DB}
      POSTGRES_USER: ${POSTGRES_TEST_USER}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD}
    volumes:
      - postgres_db_test_volume:/var/lib/postgresql/data
      - ./entrypoints/db/:/docker-entrypoint-initdb.d
    ports:
      - "5435:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_TEST_USER} -d ${POSTGRES_TEST_DB}",
        ]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_db_prod_volume:
  postgres_db_test_volume:
