on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install
      - name: Run database
        run: make test-up
      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5435 && break
            sleep 1
          done
      - name: Run tests
        run: make test
      - name: Stop database
        run: make test-down
